<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rider Dashboard — Mag-City Errands</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --orange: #FF6B2B; --dark: #0a0a0a; --mid: #141414; --border: rgba(255,255,255,0.08); --text: #f0f0f0; --muted: #888; --green: #22c55e; }
    body { font-family: 'DM Sans', sans-serif; background: var(--dark); color: var(--text); min-height: 100vh; }
    .nav { display: flex; align-items: center; justify-content: space-between; padding: 0 32px; height: 64px; border-bottom: 1px solid var(--border); background: rgba(10,10,10,0.9); backdrop-filter: blur(16px); position: sticky; top: 0; z-index: 100; }
    .nav-logo { display: flex; align-items: center; gap: 8px; font-family: 'Syne', sans-serif; font-weight: 800; font-size: 20px; text-decoration: none; color: inherit; }
    .logo-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--orange); }
    .rider-badge { background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3); color: #22c55e; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 12px; padding: 4px 12px; border-radius: 20px; }
    .nav-right { display: flex; align-items: center; gap: 12px; }
    .btn-logout { background: none; border: 1px solid var(--border); color: var(--muted); padding: 6px 14px; border-radius: 30px; font-size: 13px; cursor: pointer; transition: all 0.2s; }
    .btn-logout:hover { border-color: #ef4444; color: #ef4444; }
    .page { max-width: 900px; margin: 0 auto; padding: 40px 24px 80px; }
    .page-header { margin-bottom: 32px; }
    .page-tag { display: inline-block; background: rgba(34,197,94,0.12); border: 1px solid rgba(34,197,94,0.25); color: #22c55e; font-family: 'Syne', sans-serif; font-weight: 600; font-size: 12px; letter-spacing: 1px; text-transform: uppercase; padding: 5px 12px; border-radius: 30px; margin-bottom: 12px; }
    .page-header h1 { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 32px; }
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 32px; }
    @media (max-width: 640px) { .stats-row { grid-template-columns: 1fr 1fr; } }
    .stat-card { background: var(--mid); border: 1px solid var(--border); border-radius: 16px; padding: 20px; }
    .stat-card .s-label { font-size: 12px; color: var(--muted); font-family: 'Syne', sans-serif; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    .stat-card .s-value { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 26px; color: var(--orange); }
    .tabs { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
    .tab-btn { background: var(--mid); border: 1px solid var(--border); color: var(--muted); padding: 8px 20px; border-radius: 30px; font-family: 'Syne', sans-serif; font-weight: 600; font-size: 13px; cursor: pointer; transition: all 0.2s; }
    .tab-btn.active { background: var(--orange); border-color: var(--orange); color: #fff; }
    .delivery-card { background: var(--mid); border: 1px solid var(--border); border-radius: 16px; padding: 20px 24px; margin-bottom: 14px; transition: border-color 0.2s; }
    .delivery-card:hover { border-color: rgba(255,107,43,0.3); }
    .delivery-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
    .tracking-id { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 16px; color: var(--orange); letter-spacing: 1px; }
    .status-badge { font-size: 11px; font-family: 'Syne', sans-serif; font-weight: 700; padding: 4px 12px; border-radius: 20px; text-transform: uppercase; letter-spacing: 1px; }
    .s-assigned { background: rgba(234,179,8,0.15); color: #eab308; }
    .s-pickedup { background: rgba(255,107,43,0.15); color: var(--orange); }
    .s-delivered { background: rgba(34,197,94,0.15); color: #22c55e; }
    .route-row { display: flex; align-items: flex-start; gap: 16px; margin-bottom: 16px; }
    .route-line { display: flex; flex-direction: column; align-items: center; padding-top: 4px; }
    .dot-pickup { width: 10px; height: 10px; border-radius: 50%; background: var(--orange); flex-shrink: 0; }
    .dot-dropoff { width: 10px; height: 10px; border-radius: 50%; background: #22c55e; flex-shrink: 0; }
    .route-connector { width: 2px; height: 24px; background: var(--border); margin: 4px 0; }
    .route-details { flex: 1; }
    .route-item { margin-bottom: 12px; }
    .route-item .r-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px; }
    .route-item .r-value { font-size: 14px; color: var(--text); font-weight: 500; }
    .customer-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; padding: 14px; background: rgba(255,255,255,0.03); border-radius: 10px; }
    @media (max-width: 480px) { .customer-row { grid-template-columns: 1fr; } }
    .c-item .c-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px; }
    .c-item .c-value { font-size: 13px; color: var(--text); }
    .action-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .btn-action { flex: 1; min-width: 120px; padding: 12px; border: none; border-radius: 10px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 13px; cursor: pointer; transition: all 0.2s; }
    .btn-pickup { background: rgba(255,107,43,0.15); color: var(--orange); border: 1px solid rgba(255,107,43,0.3); }
    .btn-pickup:hover { background: var(--orange); color: #fff; }
    .btn-deliver { background: rgba(34,197,94,0.15); color: #22c55e; border: 1px solid rgba(34,197,94,0.3); }
    .btn-deliver:hover { background: #22c55e; color: #000; }
    .btn-call { background: rgba(255,255,255,0.05); color: var(--text); border: 1px solid var(--border); }
    .btn-call:hover { background: rgba(255,255,255,0.1); }
    .btn-whatsapp { background: rgba(37,211,102,0.1); color: #25D366; border: 1px solid rgba(37,211,102,0.3); }
    .btn-whatsapp:hover { background: #25D366; color: #fff; }
    .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
    .empty-state .e-icon { font-size: 48px; margin-bottom: 16px; }
    .empty-state h3 { font-family: 'Syne', sans-serif; font-size: 20px; color: var(--text); margin-bottom: 8px; }
    .loading { text-align: center; padding: 40px; color: var(--muted); }
    .online-toggle { display: flex; align-items: center; gap: 10px; background: var(--mid); border: 1px solid var(--border); border-radius: 30px; padding: 8px 16px; }
    .toggle-dot { width: 10px; height: 10px; border-radius: 50%; background: #22c55e; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .toggle-label { font-size: 13px; font-family: 'Syne', sans-serif; font-weight: 600; color: #22c55e; }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="index.html" class="nav-logo"><span class="logo-dot"></span>Errands</a>
    <div class="nav-right">
      <div class="online-toggle"><span class="toggle-dot"></span><span class="toggle-label">Online</span></div>
      <span class="rider-badge">🛵 Rider</span>
      <button class="btn-logout" onclick="handleLogout()">Sign out</button>
    </div>
  </nav>

  <div class="page">
    <div class="page-header">
      <div class="page-tag">🛵 Rider Portal</div>
      <h1 id="riderName">My Deliveries</h1>
    </div>

    <div class="stats-row">
      <div class="stat-card"><div class="s-label">Assigned</div><div class="s-value" id="statAssigned">0</div></div>
      <div class="stat-card"><div class="s-label">Picked Up</div><div class="s-value" id="statPickedUp">0</div></div>
      <div class="stat-card"><div class="s-label">Delivered</div><div class="s-value" id="statDelivered">0</div></div>
      <div class="stat-card"><div class="s-label">Total</div><div class="s-value" id="statTotal">0</div></div>
    </div>

    <div class="tabs">
      <button class="tab-btn active" onclick="filterOrders('all')">All</button>
      <button class="tab-btn" onclick="filterOrders('assigned')">Assigned</button>
      <button class="tab-btn" onclick="filterOrders('pickedup')">Picked Up</button>
      <button class="tab-btn" onclick="filterOrders('delivered')">Delivered</button>
    </div>

    <div id="deliveriesContainer"><div class="loading">Loading deliveries…</div></div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js';
    import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js';
    import { getFirestore, collection, query, where, getDocs, doc, getDoc, updateDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js';

    const firebaseConfig = {
      apiKey: "AIzaSyDyWMcMx6tqYHxumN3sPImoDUaTeAkNHCU",
      authDomain: "mag-city-errands.firebaseapp.com",
      projectId: "mag-city-errands",
      storageBucket: "mag-city-errands.firebasestorage.app",
      messagingSenderId: "315623986569",
      appId: "1:315623986569:web:ba7200af8ca50abc5f3d58"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let allOrders = [];
    let currentFilter = 'all';
    let currentUser = null;

    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href = 'login.html'; return; }
      currentUser = user;

      const snap = await getDoc(doc(db, 'users', user.uid));
      if (!snap.exists() || snap.data().role !== 'rider') {
        window.location.href = snap.exists() && snap.data().role === 'admin' ? 'admin-portal.html' : 'user-dashboard.html';
        return;
      }

      const name = snap.data().name || 'Rider';
      document.getElementById('riderName').textContent = name + "'s Deliveries";
      loadDeliveries(user.uid);
    });

    async function loadDeliveries(uid) {
      try {
        const q = query(collection(db, 'orders'), where('assignedRider', '==', uid));
        const snap = await getDocs(q);
        allOrders = [];
        snap.forEach(d => allOrders.push({ ...d.data(), docId: d.id }));
        allOrders.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));

        document.getElementById('statAssigned').textContent = allOrders.filter(o => o.riderStatus === 'assigned').length;
        document.getElementById('statPickedUp').textContent = allOrders.filter(o => o.riderStatus === 'pickedup').length;
        document.getElementById('statDelivered').textContent = allOrders.filter(o => o.riderStatus === 'delivered').length;
        document.getElementById('statTotal').textContent = allOrders.length;

        renderOrders(allOrders);
      } catch(e) {
        document.getElementById('deliveriesContainer').innerHTML = '<div class="empty-state"><div class="e-icon">⚠️</div><h3>Could not load deliveries</h3><p>' + e.message + '</p></div>';
      }
    }

    function renderOrders(orders) {
      const container = document.getElementById('deliveriesContainer');
      if (orders.length === 0) {
        container.innerHTML = '<div class="empty-state"><div class="e-icon">🛵</div><h3>No deliveries here</h3><p>Orders assigned to you will appear here.</p></div>';
        return;
      }
      container.innerHTML = orders.map(o => {
        const statusClass = o.riderStatus === 'delivered' ? 's-delivered' : o.riderStatus === 'pickedup' ? 's-pickedup' : 's-assigned';
        const statusLabel = o.riderStatus === 'delivered' ? '✅ Delivered' : o.riderStatus === 'pickedup' ? '🛵 Picked Up' : '📋 Assigned';
        const pickupBtn = o.riderStatus === 'assigned' ? `<button class="btn-action btn-pickup" onclick="updateStatus('${o.docId}', 'pickedup')">📦 Mark Picked Up</button>` : '';
        const deliverBtn = o.riderStatus === 'pickedup' ? `<button class="btn-action btn-deliver" onclick="updateStatus('${o.docId}', 'delivered')">✅ Mark Delivered</button>` : '';
        return `<div class="delivery-card" id="card-${o.docId}">
          <div class="delivery-top">
            <span class="tracking-id">${o.id || o.docId}</span>
            <span class="status-badge ${statusClass}">${statusLabel}</span>
          </div>
          <div class="route-row">
            <div class="route-line">
              <div class="dot-pickup"></div>
              <div class="route-connector"></div>
              <div class="dot-dropoff"></div>
            </div>
            <div class="route-details">
              <div class="route-item"><div class="r-label">Pickup</div><div class="r-value">${o.pickupAddress || '—'}</div></div>
              <div class="route-item"><div class="r-label">Drop-off</div><div class="r-value">${o.dropoffAddress || '—'}</div></div>
            </div>
          </div>
          <div class="customer-row">
            <div class="c-item"><div class="c-label">Sender</div><div class="c-value">${o.senderName || '—'}</div></div>
            <div class="c-item"><div class="c-label">Sender phone</div><div class="c-value">${o.senderPhone || '—'}</div></div>
            <div class="c-item"><div class="c-label">Recipient</div><div class="c-value">${o.recipientName || '—'}</div></div>
            <div class="c-item"><div class="c-label">Recipient phone</div><div class="c-value">${o.recipientPhone || '—'}</div></div>
          </div>
          <div class="action-row">
            ${pickupBtn}${deliverBtn}
            <button class="btn-action btn-call" onclick="window.open('tel:${o.senderPhone}')">📞 Call Sender</button>
            <button class="btn-action btn-whatsapp" onclick="window.open('https://wa.me/234${(o.recipientPhone||'').replace(/^0/,'')}')">💬 WhatsApp</button>
          </div>
        </div>`;
      }).join('');
    }

    window.updateStatus = async function(docId, status) {
      try {
        await updateDoc(doc(db, 'orders', docId), {
          riderStatus: status,
          status: status === 'delivered' ? 'Delivered' : 'In Transit',
          updatedAt: serverTimestamp()
        });
        const order = allOrders.find(o => o.docId === docId);
        if (order) { order.riderStatus = status; order.status = status === 'delivered' ? 'Delivered' : 'In Transit'; }
        document.getElementById('statAssigned').textContent = allOrders.filter(o => o.riderStatus === 'assigned').length;
        document.getElementById('statPickedUp').textContent = allOrders.filter(o => o.riderStatus === 'pickedup').length;
        document.getElementById('statDelivered').textContent = allOrders.filter(o => o.riderStatus === 'delivered').length;
        filterOrders(currentFilter);
      } catch(e) { alert('Failed to update: ' + e.message); }
    };

    window.filterOrders = function(filter) {
      currentFilter = filter;
      document.querySelectorAll('.tab-btn').forEach((b, i) => {
        b.classList.toggle('active', ['all','assigned','pickedup','delivered'][i] === filter);
      });
      const filtered = filter === 'all' ? allOrders : allOrders.filter(o => o.riderStatus === filter);
      renderOrders(filtered);
    };

    window.handleLogout = async function() {
      await signOut(auth);
      window.location.href = 'login.html';
    };
  </script>
</body>
</html>

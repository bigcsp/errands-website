<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard — MAG-CITY ERRANDS</title>
  <link href="https:// Credentials removed — authenticate via admin-portal.html

  function showMsg(type, text) {
    msgEl.className = `message ${type}`;
    msgEl.innerHTML = (type === 'error' ? '⚠ ' : '✔ ') + text;
  }

  loginBtn.addEventListener('click', () => {
    const id  = document.getElementById('adminId').value.trim();
    const pw  = document.getElementById('password').value;
    msgEl.className = 'message';

    if (!id || !pw) {
      showMsg('error', 'Please fill in all fields.');
      return;
    }

    // Loading state
    loginBtn.classList.add('loading');
    loginBtn.disabled = true;

    setTimeout(() => {
      const match = ADMIN_CREDENTIALS.find(c => c.id === id && c.password === pw);

      if (match) {
        showMsg('success', 'Login successful! Redirecting…');
        setTimeout(() => {
          window.location.href = 'admin-dashboard.html'; // 🔁 change to your dashboard page
        }, 1200);
      } else {
        showMsg('error', 'Invalid credentials. Please try again.');
        loginBtn.classList.remove('loading');
        loginBtn.disabled = false;
      }
    }, 1500);
  });

  /* ── DOWNLOAD PAGE FUNCTION ── */
  function downloadPage() {
    // Grab the full current HTML of the page
    const html = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;

    // Create a Blob and trigger a file download
    const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
    const url  = URL.createObjectURL(blob);

    const a       = document.createElement('a');
    a.href        = url;
    a.download    = 'admin.html';           // filename saved to device
    a.style.display = 'none';
    document.body.appendChild(a);
    a.click();

    // Cleanup
    setTimeout(() => {
      URL.revokeObjectURL(url);
      document.body.removeChild(a);
    }, 1000);

    showToast();
  }

  function showToast() {
    const toast = document.getElementById('toast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
  }

  document.getElementById('downloadBtn').addEventListener('click', downloadPage);

  /* ── PWA INSTALL FUNCTION ── */
  let deferredPrompt = null;
  const installBtn   = document.getElementById('installBtn');

  // Browser fires this when the app is installable
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();                    // stop the default mini-infobar
    deferredPrompt = e;
    installBtn.style.display = 'flex';    // show our custom Install button
  });

  installBtn.addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();               // show the browser install dialog
    const { outcome } = await deferredPrompt.userChoice;
    if (outcome === 'accepted') {
      installBtn.style.display = 'none';  // hide button after install
    }
    deferredPrompt = null;
  });

  // Hide install button if already installed (standalone mode)
  window.addEventListener('appinstalled', () => {
    installBtn.style.display = 'none';
    deferredPrompt = null;
  });

  /* ── Register Service Worker (for PWA) ── */
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }

  /* ── Enter key support ── */
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') loginBtn.click();
  });
</script>

<script>
/* AUTH GUARD: redirect to login if no valid session */
(function() {
  try {
    var raw = sessionStorage.getItem('mc_admin_session');
    if (!raw) { window.location.replace('admin-portal.html'); return; }
    var s = JSON.parse(raw);
    if (!s.token || Date.now() >= s.expires) {
      sessionStorage.removeItem('mc_admin_session');
      window.location.replace('admin-portal.html');
    }
  } catch(e) { window.location.replace('admin-portal.html'); }
})();
</script>
</body>
</html>

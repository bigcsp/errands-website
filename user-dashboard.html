<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Orders — Mag-City Errands</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --orange: #FF6B2B; --dark: #0a0a0a; --mid: #141414; --border: rgba(255,255,255,0.08); --text: #f0f0f0; --muted: #888; --green: #22c55e; }
    body { font-family: 'DM Sans', sans-serif; background: var(--dark); color: var(--text); min-height: 100vh; }
    .nav { display: flex; align-items: center; justify-content: space-between; padding: 0 32px; height: 64px; border-bottom: 1px solid var(--border); background: rgba(10,10,10,0.9); backdrop-filter: blur(16px); position: sticky; top: 0; z-index: 100; }
    .nav-logo { display: flex; align-items: center; gap: 8px; font-family: 'Syne', sans-serif; font-weight: 800; font-size: 20px; text-decoration: none; color: inherit; }
    .logo-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--orange); }
    .nav-right { display: flex; align-items: center; gap: 12px; }
    .user-pill { background: var(--mid); border: 1px solid var(--border); border-radius: 30px; padding: 6px 14px; font-size: 13px; color: var(--muted); }
    .btn-logout { background: none; border: 1px solid var(--border); color: var(--muted); padding: 6px 14px; border-radius: 30px; font-size: 13px; cursor: pointer; transition: all 0.2s; }
    .btn-logout:hover { border-color: #ef4444; color: #ef4444; }
    .page { max-width: 800px; margin: 0 auto; padding: 40px 24px 80px; }
    .page-header { margin-bottom: 32px; }
    .page-tag { display: inline-block; background: rgba(255,107,43,0.12); border: 1px solid rgba(255,107,43,0.25); color: var(--orange); font-family: 'Syne', sans-serif; font-weight: 600; font-size: 12px; letter-spacing: 1px; text-transform: uppercase; padding: 5px 12px; border-radius: 30px; margin-bottom: 12px; }
    .page-header h1 { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 32px; }
    .page-header p { color: var(--muted); margin-top: 6px; }
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 32px; }
    @media (max-width: 520px) { .stats-row { grid-template-columns: 1fr; } }
    .stat-card { background: var(--mid); border: 1px solid var(--border); border-radius: 16px; padding: 20px; }
    .stat-card .s-label { font-size: 12px; color: var(--muted); font-family: 'Syne', sans-serif; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    .stat-card .s-value { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 28px; color: var(--orange); }
    .section-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 16px; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; }
    .btn-new-order { background: var(--orange); color: #fff; border: none; border-radius: 30px; padding: 8px 20px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 13px; cursor: pointer; text-decoration: none; }
    .order-card { background: var(--mid); border: 1px solid var(--border); border-radius: 16px; padding: 20px 24px; margin-bottom: 14px; transition: border-color 0.2s; }
    .order-card:hover { border-color: rgba(255,107,43,0.3); }
    .order-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; flex-wrap: wrap; gap: 8px; }
    .tracking-id { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 16px; color: var(--orange); letter-spacing: 1px; }
    .status-badge { font-size: 11px; font-family: 'Syne', sans-serif; font-weight: 700; padding: 4px 12px; border-radius: 20px; text-transform: uppercase; letter-spacing: 1px; }
    .status-pending { background: rgba(234,179,8,0.15); color: #eab308; }
    .status-paid { background: rgba(34,197,94,0.15); color: #22c55e; }
    .status-delivered { background: rgba(59,130,246,0.15); color: #60a5fa; }
    .status-whatsapp { background: rgba(37,211,102,0.15); color: #25D366; }
    .order-details { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    @media (max-width: 480px) { .order-details { grid-template-columns: 1fr; } }
    .detail-item .d-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px; }
    .detail-item .d-value { font-size: 13px; color: var(--text); font-weight: 500; }
    .order-footer { margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--border); display: flex; gap: 10px; align-items: center; justify-content: space-between; flex-wrap: wrap; }
    .price-tag { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 18px; color: var(--orange); }
    .btn-track { background: rgba(255,107,43,0.1); border: 1px solid rgba(255,107,43,0.3); color: var(--orange); padding: 8px 18px; border-radius: 30px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 13px; text-decoration: none; transition: all 0.2s; }
    .btn-track:hover { background: var(--orange); color: #fff; }
    .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
    .empty-state .e-icon { font-size: 48px; margin-bottom: 16px; }
    .empty-state h3 { font-family: 'Syne', sans-serif; font-size: 20px; color: var(--text); margin-bottom: 8px; }
    .loading { text-align: center; padding: 40px; color: var(--muted); }
    .auth-guard { display: none; }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="index.html" class="nav-logo"><span class="logo-dot"></span>Errands</a>
    <div class="nav-right">
      <span class="user-pill" id="userPill">Loading…</span>
      <button class="btn-logout" onclick="handleLogout()">Sign out</button>
    </div>
  </nav>

  <div class="page">
    <div class="page-header">
      <div class="page-tag">👤 My Account</div>
      <h1>My Orders</h1>
      <p id="welcomeMsg">Welcome back!</p>
    </div>

    <div class="stats-row">
      <div class="stat-card">
        <div class="s-label">Total orders</div>
        <div class="s-value" id="statTotal">0</div>
      </div>
      <div class="stat-card">
        <div class="s-label">Active</div>
        <div class="s-value" id="statActive">0</div>
      </div>
      <div class="stat-card">
        <div class="s-label">Delivered</div>
        <div class="s-value" id="statDelivered">0</div>
      </div>
    </div>

    <div class="section-title">
      <span>Order History</span>
      <a href="order.html" class="btn-new-order">+ New Order</a>
    </div>

    <div id="ordersContainer"><div class="loading">Loading your orders…</div></div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js';
    import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js';
    import { getFirestore, collection, query, where, orderBy, getDocs, doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js';

    const firebaseConfig = {
      apiKey: "AIzaSyDyWMcMx6tqYHxumN3sPImoDUaTeAkNHCU",
      authDomain: "mag-city-errands.firebaseapp.com",
      projectId: "mag-city-errands",
      storageBucket: "mag-city-errands.firebasestorage.app",
      messagingSenderId: "315623986569",
      appId: "1:315623986569:web:ba7200af8ca50abc5f3d58"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href = 'login.html'; return; }

      const snap = await getDoc(doc(db, 'users', user.uid));
      if (snap.exists()) {
        const data = snap.data();
        if (data.role === 'admin') { window.location.href = 'admin-portal.html'; return; }
        if (data.role === 'rider') { window.location.href = 'rider-dashboard.html'; return; }
        document.getElementById('userPill').textContent = data.name || user.email;
        document.getElementById('welcomeMsg').textContent = 'Welcome back, ' + (data.name ? data.name.split(' ')[0] : '') + '!';
      } else {
        document.getElementById('userPill').textContent = user.email;
      }

      loadOrders(user.email);
    });

    async function loadOrders(email) {
      // Load from Firestore
      let orders = [];
      try {
        const q = query(collection(db, 'orders'), where('senderEmail', '==', email), orderBy('createdAt', 'desc'));
        const snap = await getDocs(q);
        snap.forEach(d => orders.push({ ...d.data(), id: d.id }));
      } catch(e) { console.log('Firestore orders:', e); }

      // Also load from localStorage (backward compat)
      const local = JSON.parse(localStorage.getItem('errands_orders') || '[]');
      const localFiltered = local.filter(o => o.senderEmail === email);
      // Merge — avoid duplicates
      const fsIds = new Set(orders.map(o => o.id));
      localFiltered.forEach(o => { if (!fsIds.has(o.id)) orders.push(o); });

      // Sort by date
      orders.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

      // Stats
      document.getElementById('statTotal').textContent = orders.length;
      document.getElementById('statActive').textContent = orders.filter(o => o.status !== 'Delivered').length;
      document.getElementById('statDelivered').textContent = orders.filter(o => o.status === 'Delivered').length;

      const container = document.getElementById('ordersContainer');
      if (orders.length === 0) {
        container.innerHTML = `<div class="empty-state"><div class="e-icon">📦</div><h3>No orders yet</h3><p>Your order history will appear here once you place your first order.</p><br/><a href="order.html" class="btn-new-order">Place your first order</a></div>`;
        return;
      }

      container.innerHTML = orders.map(o => {
        const statusClass = o.paymentStatus === 'paid' ? 'status-paid' : o.paymentStatus === 'pending-whatsapp' ? 'status-whatsapp' : 'status-pending';
        const statusLabel = o.paymentStatus === 'paid' ? '✅ Paid' : o.paymentStatus === 'pending-whatsapp' ? '💬 WhatsApp' : '⏳ Pending';
        const date = o.pickupDate || (o.createdAt ? new Date(o.createdAt).toLocaleDateString() : '—');
        return `<div class="order-card">
          <div class="order-top">
            <span class="tracking-id">${o.id}</span>
            <span class="status-badge ${statusClass}">${statusLabel}</span>
          </div>
          <div class="order-details">
            <div class="detail-item"><div class="d-label">Pickup</div><div class="d-value">${o.pickupAddress || '—'}</div></div>
            <div class="detail-item"><div class="d-label">Drop-off</div><div class="d-value">${o.dropoffAddress || '—'}</div></div>
            <div class="detail-item"><div class="d-label">Package</div><div class="d-value">${o.packageType || '—'}</div></div>
            <div class="detail-item"><div class="d-label">Date</div><div class="d-value">${date}</div></div>
          </div>
          <div class="order-footer">
            <span class="price-tag">₦${(o.price || 0).toLocaleString()}</span>
            <a href="track.html?tracking=${o.id}" class="btn-track">🔍 Track Order</a>
          </div>
        </div>`;
      }).join('');
    }

    window.handleLogout = async function() {
      await signOut(auth);
      window.location.href = 'login.html';
    };
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Statistics - MAG-CITY Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  :root { --black:#0a0a0a; --orange:#FF6B2B; --cream:#FFF8F2; --gray:#888; --border:#e8e0d8; --green:#22c55e; --blue:#3b82f6; --yellow:#f59e0b; --red:#ef4444; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#111; font-family:'DM Sans',sans-serif; color:#fff; min-height:100vh; }
  .topbar { background:#1a1a1a; border-bottom:1px solid #333; padding:16px 32px; display:flex; align-items:center; justify-content:space-between; }
  .topbar .logo { font-family:'Bebas Neue',sans-serif; font-size:24px; color:var(--orange); letter-spacing:2px; }
  .nav-links { display:flex; gap:16px; }
  .nav-link { color:#aaa; text-decoration:none; font-size:14px; padding:8px 16px; border-radius:8px; border:1px solid #333; transition:all .2s; }
  .nav-link:hover { border-color:var(--orange); color:var(--orange); }
  .nav-link.active { background:var(--orange); color:#fff; border-color:var(--orange); }
  .main { padding:24px 32px; }
  .page-title { font-family:'Bebas Neue',sans-serif; font-size:32px; letter-spacing:2px; color:var(--orange); margin-bottom:24px; }

  .stats-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:24px; }
  .stat-card { background:#1a1a1a; border:1px solid #333; border-radius:14px; padding:24px; position:relative; overflow:hidden; }
  .stat-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:var(--orange); }
  .stat-card.green::before { background:var(--green); }
  .stat-card.blue::before { background:var(--blue); }
  .stat-card.yellow::before { background:var(--yellow); }
  .stat-num { font-family:'Bebas Neue',sans-serif; font-size:42px; color:var(--orange); line-height:1; }
  .stat-card.green .stat-num { color:var(--green); }
  .stat-card.blue .stat-num { color:var(--blue); }
  .stat-card.yellow .stat-num { color:var(--yellow); }
  .stat-label { font-size:13px; color:#888; text-transform:uppercase; letter-spacing:.5px; margin-top:6px; }
  .stat-change { font-size:12px; margin-top:8px; }
  .stat-change.up { color:var(--green); }
  .stat-change.down { color:var(--red); }

  .charts-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:24px; }
  .chart-card { background:#1a1a1a; border:1px solid #333; border-radius:14px; padding:24px; }
  .chart-title { font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:2px; color:var(--orange); margin-bottom:20px; }
  .chart-wrap { position:relative; height:250px; }

  .full-card { background:#1a1a1a; border:1px solid #333; border-radius:14px; padding:24px; margin-bottom:20px; }

  .status-bars { display:flex; flex-direction:column; gap:14px; }
  .status-bar-item { display:flex; align-items:center; gap:12px; }
  .status-bar-label { width:100px; font-size:13px; color:#aaa; }
  .status-bar-track { flex:1; height:10px; background:#333; border-radius:5px; overflow:hidden; }
  .status-bar-fill { height:100%; border-radius:5px; transition:width 1s ease; }
  .status-bar-count { width:40px; text-align:right; font-size:13px; font-weight:600; }

  .recent-table { width:100%; border-collapse:collapse; }
  .recent-table th { text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:.5px; color:#555; padding:8px 12px; border-bottom:1px solid #333; }
  .recent-table td { padding:12px; border-bottom:1px solid #222; font-size:14px; }
  .recent-table tr:hover td { background:#222; }
  .badge { padding:4px 10px; border-radius:20px; font-size:11px; font-weight:700; }
  .badge-Pending { background:rgba(245,158,11,.2); color:var(--yellow); }
  .badge-PickedUp { background:rgba(59,130,246,.2); color:var(--blue); }
  .badge-OnTheWay { background:rgba(59,130,246,.2); color:var(--blue); }
  .badge-Delivered { background:rgba(34,197,94,.2); color:var(--green); }

  .loading { text-align:center; padding:60px; color:#555; }
  .back-btn { background:none; border:1px solid #444; color:#aaa; padding:8px 16px; border-radius:8px; cursor:pointer; font-size:13px; text-decoration:none; }
  .back-btn:hover { border-color:var(--orange); color:var(--orange); }

  @media(max-width:900px) {
    .stats-grid { grid-template-columns:1fr 1fr; }
    .charts-grid { grid-template-columns:1fr; }
    .main { padding:16px; }
    .topbar { padding:14px 16px; flex-wrap:wrap; gap:12px; }
  }
  @media(max-width:600px) {
    .stats-grid { grid-template-columns:1fr 1fr; }
  }
</style>
</head>
<body>

<div class="topbar">
  <a href="index.html" style="text-decoration:none;">
    <div class="logo">MAG-CITY Admin</div>
  </a>
  <div class="nav-links">
    <a href="admin.html" class="nav-link">Orders</a>
    <a href="stats.html" class="nav-link active">Statistics</a>
    <a href="index.html" class="back-btn">Back to Site</a>
  </div>
</div>

<div class="main">
  <div class="page-title">Statistics Dashboard</div>

  <!-- Key Stats -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-num" id="totalOrders">0</div>
      <div class="stat-label">Total Orders</div>
      <div class="stat-change up" id="totalChange"></div>
    </div>
    <div class="stat-card green">
      <div class="stat-num" id="totalDelivered">0</div>
      <div class="stat-label">Delivered</div>
      <div class="stat-change up" id="deliveredRate"></div>
    </div>
    <div class="stat-card blue">
      <div class="stat-num" id="totalActive">0</div>
      <div class="stat-label">Active Orders</div>
      <div class="stat-change" id="activeChange"></div>
    </div>
    <div class="stat-card yellow">
      <div class="stat-num" id="totalPending">0</div>
      <div class="stat-label">Pending</div>
      <div class="stat-change" id="pendingChange"></div>
    </div>
  </div>

  <!-- Charts -->
  <div class="charts-grid">
    <div class="chart-card">
      <div class="chart-title">Orders by Status</div>
      <div class="chart-wrap">
        <canvas id="statusChart"></canvas>
      </div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Orders by Service Type</div>
      <div class="chart-wrap">
        <canvas id="serviceChart"></canvas>
      </div>
    </div>
  </div>

  <div class="charts-grid">
    <div class="chart-card">
      <div class="chart-title">Orders by Package Size</div>
      <div class="chart-wrap">
        <canvas id="sizeChart"></canvas>
      </div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Daily Orders This Week</div>
      <div class="chart-wrap">
        <canvas id="dailyChart"></canvas>
      </div>
    </div>
  </div>

  <!-- Status Breakdown -->
  <div class="full-card">
    <div class="chart-title">Status Breakdown</div>
    <div class="status-bars" id="statusBars">
      <div class="loading">Loading...</div>
    </div>
  </div>

  <!-- Recent Orders -->
  <div class="full-card">
    <div class="chart-title">Recent Orders</div>
    <div id="recentOrders"><div class="loading">Loading...</div></div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, getDocs, orderBy, query } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDyWMcMx6tqYHxumN3sPImoDUaTeAkNHCU",
    authDomain: "mag-city-errands.firebaseapp.com",
    projectId: "mag-city-errands",
    storageBucket: "mag-city-errands.firebasestorage.app",
    messagingSenderId: "315623986569",
    appId: "1:315623986569:web:ba7200af8ca50abc5f3d58"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const CHART_COLORS = {
    orange: '#FF6B2B',
    green: '#22c55e',
    blue: '#3b82f6',
    yellow: '#f59e0b',
    red: '#ef4444',
    purple: '#a855f7'
  };

  async function loadStats() {
    try {
      const q = query(collection(db, 'orders'), orderBy('createdAt', 'desc'));
      const snap = await getDocs(q);
      const orders = snap.docs.map(d => ({ id: d.id, ...d.data() }));

      if (!orders.length) {
        document.getElementById('recentOrders').innerHTML = '<div class="loading">No orders yet</div>';
        return;
      }

      // Key stats
      const total = orders.length;
      const delivered = orders.filter(o => o.status === 'Delivered').length;
      const active = orders.filter(o => o.status === 'Picked Up' || o.status === 'On The Way').length;
      const pending = orders.filter(o => o.status === 'Pending').length;
      const rate = total > 0 ? Math.round((delivered / total) * 100) : 0;

      document.getElementById('totalOrders').textContent = total;
      document.getElementById('totalDelivered').textContent = delivered;
      document.getElementById('totalActive').textContent = active;
      document.getElementById('totalPending').textContent = pending;
      document.getElementById('deliveredRate').textContent = rate + '% success rate';
      document.getElementById('activeChange').textContent = active + ' in progress';
      document.getElementById('pendingChange').textContent = pending + ' awaiting pickup';

      // Status chart
      new Chart(document.getElementById('statusChart'), {
        type: 'doughnut',
        data: {
          labels: ['Pending', 'Picked Up', 'On The Way', 'Delivered'],
          datasets: [{
            data: [
              orders.filter(o => o.status === 'Pending').length,
              orders.filter(o => o.status === 'Picked Up').length,
              orders.filter(o => o.status === 'On The Way').length,
              orders.filter(o => o.status === 'Delivered').length
            ],
            backgroundColor: [CHART_COLORS.yellow, CHART_COLORS.blue, CHART_COLORS.purple, CHART_COLORS.green],
            borderWidth: 0
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { position: 'bottom', labels: { color: '#aaa', padding: 16 } } }
        }
      });

      // Service type chart
      const services = {};
      orders.forEach(o => { services[o.serviceType] = (services[o.serviceType] || 0) + 1; });
      new Chart(document.getElementById('serviceChart'), {
        type: 'bar',
        data: {
          labels: Object.keys(services),
          datasets: [{ data: Object.values(services), backgroundColor: CHART_COLORS.orange, borderRadius: 6 }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: { ticks: { color: '#aaa' }, grid: { color: '#333' } },
            y: { ticks: { color: '#aaa', stepSize: 1 }, grid: { color: '#333' } }
          }
        }
      });

      // Package size chart
      const sizes = {};
      orders.forEach(o => { sizes[o.packageSize] = (sizes[o.packageSize] || 0) + 1; });
      new Chart(document.getElementById('sizeChart'), {
        type: 'bar',
        data: {
          labels: Object.keys(sizes),
          datasets: [{ data: Object.values(sizes), backgroundColor: CHART_COLORS.blue, borderRadius: 6 }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: { ticks: { color: '#aaa' }, grid: { color: '#333' } },
            y: { ticks: { color: '#aaa', stepSize: 1 }, grid: { color: '#333' } }
          }
        }
      });

      // Daily orders this week
      const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      const dailyCounts = [0,0,0,0,0,0,0];
      const now = new Date();
      orders.forEach(o => {
        if (o.createdAt && o.createdAt.toDate) {
          const d = o.createdAt.toDate();
          const diff = Math.floor((now - d) / (1000 * 60 * 60 * 24));
          if (diff < 7) dailyCounts[d.getDay()]++;
        }
      });
      new Chart(document.getElementById('dailyChart'), {
        type: 'line',
        data: {
          labels: days,
          datasets: [{
            data: dailyCounts,
            borderColor: CHART_COLORS.orange,
            backgroundColor: 'rgba(255,107,43,0.1)',
            fill: true, tension: 0.4, pointBackgroundColor: CHART_COLORS.orange, pointRadius: 5
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: { ticks: { color: '#aaa' }, grid: { color: '#333' } },
            y: { ticks: { color: '#aaa', stepSize: 1 }, grid: { color: '#333' } }
          }
        }
      });

      // Status breakdown bars
      const statusData = [
        { label: 'Pending', count: pending, color: CHART_COLORS.yellow },
        { label: 'Picked Up', count: orders.filter(o => o.status === 'Picked Up').length, color: CHART_COLORS.blue },
        { label: 'On The Way', count: orders.filter(o => o.status === 'On The Way').length, color: CHART_COLORS.purple },
        { label: 'Delivered', count: delivered, color: CHART_COLORS.green }
      ];
      document.getElementById('statusBars').innerHTML = statusData.map(s => `
        <div class="status-bar-item">
          <div class="status-bar-label">${s.label}</div>
          <div class="status-bar-track">
            <div class="status-bar-fill" style="width:${total > 0 ? (s.count/total*100) : 0}%;background:${s.color};"></div>
          </div>
          <div class="status-bar-count" style="color:${s.color}">${s.count}</div>
        </div>`).join('');

      // Recent orders table
      const recent = orders.slice(0, 10);
      document.getElementById('recentOrders').innerHTML = `
        <table class="recent-table">
          <thead>
            <tr>
              <th>Tracking</th>
              <th>Customer</th>
              <th>Service</th>
              <th>Status</th>
              <th>Phone</th>
            </tr>
          </thead>
          <tbody>
            ${recent.map(o => `
              <tr>
                <td style="font-family:'Bebas Neue',sans-serif;color:var(--orange);letter-spacing:1px;">${o.trackingNumber}</td>
                <td>${o.customerName}</td>
                <td>${o.serviceType || '-'}</td>
                <td><span class="badge badge-${(o.status||'').replace(/\s/g,'')}">${o.status}</span></td>
                <td style="color:#888">${o.customerPhone}</td>
              </tr>`).join('')}
          </tbody>
        </table>`;

    } catch(e) {
      console.error(e);
      document.getElementById('recentOrders').innerHTML = '<div class="loading">Error: ' + e.message + '</div>';
    }
  }

  loadStats();
</script>

</body>
</html>
